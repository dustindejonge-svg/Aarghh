<style>
  :root{
    /* Space + apple theme */
    --gold:#f4cd58; --gold-deep:#b9941e; --apple-red:#d9434b;
    --nebula-cyan:#3aa3d8; --nebula-purple:#7c5cff;
    --space-deep:#0a0e2c; --space-mid:#1f1a3f; --space-glow:#2c1f4f;
    --cream:#f7f0e3; --card:#ffffff; --ink:#1d1a1f;
    --muted:#8a7a82;                /* muted text INSIDE cards */
    --on-dark:#cdd4ee;               /* secondary text on dark background */
    --on-dark-strong:#f1f3ff;        /* primary text on dark background */

  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;

      radial-gradient(700px 500px at 85% 110%, rgba(58,163,216,0.12), transparent 65%),
      linear-gradient(180deg, var(--space-deep) 0%, var(--space-mid) 60%, var(--space-deep) 100%);
    background-attachment:fixed;
    color:var(--on-dark-strong);line-height:1.5;min-height:100vh}
  .wrap{max-width:880px;margin:0 auto;padding:0 16px 64px}

  /* ---------- Banner (hero image) ---------- */
  header.banner{margin:14px 0 0;border-radius:var(--radius);overflow:hidden;
    box-shadow:0 14px 40px rgba(0,0,0,0.55), 0 0 0 1px rgba(124,92,255,0.18) inset;
    background:#0a0e2c}
  header.banner img.hero{width:100%;height:auto;display:block}
  .greet-row{display:flex;align-items:flex-start;gap:18px;padding:16px 4px 0}
  .greet-egg{flex:none;display:flex;flex-direction:column;align-items:center;gap:2px}
  .greet-egg img.egg{height:150px;width:auto;
    filter:drop-shadow(0 8px 18px rgba(0,0,0,0.45))}

    font-family:Georgia,"Times New Roman",serif;
    font-size:18px;font-weight:800;letter-spacing:1px;
    color:var(--gold);text-shadow:0 2px 6px rgba(0,0,0,0.65), 0 0 14px rgba(244,205,88,0.35);
    margin-top:-2px}

    padding:12px 16px;border-radius:18px;border-bottom-left-radius:3px;
    font-size:14px;line-height:1.5;box-shadow:var(--shadow);
    flex:1 1 0;min-width:0;margin-top:10px;position:relative}
  /* Speech-bubble tail pointing at Egg (roughly at his face/mouth height) */
  .bubble::before{content:"";position:absolute;left:-10px;top:40px;width:0;height:0;
    border:9px solid transparent;border-right-color:var(--cream);border-left:0}
  .bubble .greet-line{font-weight:700;color:var(--ink)}
  .bubble .bubble-rule{height:1px;background:rgba(0,0,0,0.08);margin:8px 0}
  .bubble .bubble-disclaimer{font-size:13px;color:#5c4f3d;font-style:italic}
  .bubble .bubble-disclaimer b{color:var(--apple-red);font-style:normal}

  /* ---------- Tabs ---------- */
  nav.tabs{position:sticky;top:0;z-index:5;
    background:rgba(10,14,44,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(255,255,255,0.08);
    box-shadow:0 6px 14px rgba(0,0,0,0.3);
    margin-top:16px;border-radius:14px}
  .tabs-inner{max-width:880px;margin:0 auto;display:flex;gap:4px;padding:8px 10px;
    overflow-x:auto;-webkit-overflow-scrolling:touch}
  .tab{flex:1 0 auto;border:none;background:transparent;padding:10px 12px;border-radius:12px;
    font-size:13px;font-weight:600;color:var(--on-dark);cursor:pointer;white-space:nowrap}
  .tab.active{background:var(--gold);color:#1d1a1f;box-shadow:0 4px 12px rgba(244,205,88,0.35)}

  /* ---------- Cards ---------- */
  .view{padding-top:18px}
  .view-head{display:flex;align-items:center;gap:14px;margin-bottom:12px}
  .view-head img{height:84px;width:auto;flex:none}
  .view-head .speak{background:var(--card);color:var(--ink);
    border-radius:14px;padding:10px 14px;
    box-shadow:var(--shadow);font-size:15px}
  .section-title{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--gold);

    padding:14px 16px;margin-bottom:10px;border-left:5px solid #ccc;position:relative}

     from coursework assessments. Subject border-left stays so you can still
     see which subject it belongs to. */

  .chip{font-size:11px;font-weight:700;color:#fff;padding:3px 9px;border-radius:20px;white-space:nowrap}
  .card h3{margin:6px 0 2px;font-size:16px}

  .due{font-size:13px;font-weight:700}

  .badge-new{background:var(--gold);color:#3a2b10;font-size:10px;font-weight:800;

  .lesson-body,.term-body{font-size:14px;margin-top:6px;white-space:pre-wrap}

/* ---------- Date helpers ---------- */
function today(){ return new Date(); }
function parseD(s){ if(!s) return null; const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); }
function fmt(s){ const d=parseD(s); if(!d) return "Date TBC";
  return d.toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"short"}); }
function daysUntil(s){ const d=parseD(s); if(!d) return null;
  const t=today(); t.setHours(0,0,0,0); return Math.round((d-t)/86400000); }
function dueLabel(s){
  const n=daysUntil(s); if(n===null) return {txt:"Date TBC",cls:"ok"};
  if(n<0) return {txt:`${-n} day${-n===1?"":"s"} ago`,cls:"over"};
  if(n===0) return {txt:"Due today!",cls:"soon"};
  if(n===1) return {txt:"Due tomorrow",cls:"soon"};
  if(n<=7) return {txt:`In ${n} days`,cls:"soon"};
  return {txt:`In ${n} days`,cls:"ok"};
}

  subs.forEach(s=>{
    const active = current===s;
    const bg = active ? `style="background:${subjColor(s)};border-color:${subjColor(s)}"` : "";
    pills.push(`<button class="subj-pill${active?" active":""}" ${bg} onclick="setFilter('${view}','${s}')">${subjName(s)}</button>`);
  });
  return `<div class="subj-filter">${pills.join("")}</div>`;
}

/* ---------- Get data (demo or Supabase) ---------- */
async function getData(){
  if(CONFIG.USE_DEMO_DATA){ DEMO.lastUpdated=CONFIG.LAST_UPDATED; return DEMO; }
  const rows = await sbSelect("content");
  const data={assessments:[],lessons:[],termOverviews:[],mathsEquations:[],lastUpdated:null};
  for(const r of rows){
    if(r.kind==="assessment") data.assessments.push({subject:r.subject_id,title:r.title,due_date:r.due_date,term:r.term,formal:r.is_formal,status:r.status,desc:r.body});
    else if(r.kind==="lesson") data.lessons.push({subject:r.subject_id,lesson_date:r.lesson_date,term:r.term,week:r.week,title:r.title,body:r.body});
    else if(r.kind==="term_overview") data.termOverviews.push({subject:r.subject_id,term:r.term,body:r.body,topics:(r.topics||"").split("\n").filter(Boolean)});
    else if(r.kind==="maths_equations") data.mathsEquations.push({subject:r.subject_id,week:r.week,term:r.term,dates:r.dates,topic:r.title,equations:(r.body||"").split("\n").filter(Boolean)});
    if(r.updated_at && (!data.lastUpdated || r.updated_at>data.lastUpdated)) data.lastUpdated=r.updated_at;
  }
  return data;
}

/* ---------- Renderers ---------- */
function fmtFull(s){ const d=parseD((s||"").slice(0,10)); if(!d) return "unknown";
  return d.toLocaleDateString("en-AU",{weekday:"short",day:"numeric",month:"long",year:"numeric"}); }

function renderMeta(data){
  document.getElementById("lastUpdated").innerHTML = "Last updated: <b>"+fmtFull(data.lastUpdated)+"</b>";
  const have=new Set();
  (data.assessments||[]).forEach(a=>have.add(a.subject));
  (data.lessons||[]).forEach(a=>have.add(a.subject));
  (data.termOverviews||[]).forEach(a=>have.add(a.subject));
  if((data.mathsEquations||[]).length) have.add("maths");
  const names=Object.keys(SUBJECTS).filter(s=>have.has(s)).map(subjName);
  const covers=names.length?names.join(", "):"—";
  // Pick a random disclaimer on each page load — mix of silly, warning, real.
  const msg = DISCLAIMERS[Math.floor(Math.random()*DISCLAIMERS.length)]
    .replace(/{covers}/g, covers);
  document.getElementById("coverage").innerHTML = msg;
}

/* Tests get a warm-amber card + red "TEST" badge so they stand out from
   coursework assessments. We detect tests by title (matches the regex in
   eggify/parse_outlines.py and sync_aarghh.py) — keep these three in sync. */
const TEST_TITLE_RE   = /\b(test|exam|cat|naplan)\b/i;
const TEST_EXCLUDE_RE = /\b(practice|revision|recap|prep|review|study)\b/i;
function isTest(title){
  if(!title) return false;
  if(TEST_EXCLUDE_RE.test(title)) return false;
  return TEST_TITLE_RE.test(title);
}

function card(a){
  const due=dueLabel(a.due_date);
  const newBadge = a.isNew ? '<span class="badge-new">NEW</span>' : '';
  const formal = a.formal ? '<span class="formal">CAT/EXAM</span>' : '';
  const test = isTest(a.title);
  const testBadge = test ? '<span class="test-badge">TEST</span>' : '';
  const testCls = test ? ' is-test' : '';
  return `<div class="card${testCls}" style="border-left-color:${subjColor(a.subject)}">
    <div class="top">
      <span class="chip" style="background:${subjColor(a.subject)}">${subjName(a.subject)}</span>
      <span class="due ${due.cls}">${due.txt}</span>
    </div>
    <h3>${a.title}${formal}${testBadge}${newBadge}</h3>
    <div class="meta">Due ${fmt(a.due_date)} · Term ${a.term||"?"}</div>
    ${a.desc?`<div class="adesc">${a.desc}</div>`:""}
  </div>`;
}

function renderAssessments(data){
  // Submitted assessments are dropped from the source files (see assessments.md
  // notes — "done = deleted" applies to both submitted and graded). We only
  // render the upcoming list now.
  const up=data.assessments.filter(a=>a.status==="upcoming")
    .sort((x,y)=>(parseD(x.due_date)||0)-(parseD(y.due_date)||0));
  let html=`<div class="view-head">
    <img src="images/egg-calendar.png" alt="Egg with a calendar">
    <div class="speak">Here's what's coming up, dude. Soonest first — don't get dumped by a deadline!</div>
  </div>`;
  if(up.length){ html+=`<div class="section-title">Upcoming</div>`+up.map(card).join(""); }
  else { html+=`<div class="empty"><img src="images/egg-chill.png" alt="Egg relaxing"><p>All clear, dude — nothing due right now. Go catch a wave.</p></div>`; }
  document.getElementById("view-assessments").innerHTML=html;
}

function renderLessons(data){
  let html=`<div class="view-head">
    <img src="images/egg-teacher.png" alt="Egg as a teacher">
    <div class="speak">Lesson rundowns by subject, dude. Here's the gist of what you covered.</div>
  </div>`;
  const bySub={};
  data.lessons.forEach(l=>{(bySub[l.subject]=bySub[l.subject]||[]).push(l);});
  const subs=Object.keys(SUBJECTS).filter(s=>bySub[s]&&bySub[s].length);
  if(!subs.length){
    html+=`<div class="empty"><img src="images/egg-hmm.png" alt="Egg puzzled"><p>No lesson outlines yet, dude. They'll show up once the lessons get summarised.</p></div>`;
  } else {
    let current = getFilter("lessons");
    if(current !== "all" && !subs.includes(current)) current = "all";
    html += subjFilterBar("lessons", subs, current);
    const showSubs = (current === "all") ? subs : [current];
    showSubs.forEach(s=>{
      // When a single subject is selected, skip the section title — the pill already tells you.
      if(current === "all") html+=`<div class="section-title" style="color:${subjColor(s)}">${subjName(s)}</div>`;
      bySub[s].sort((a,b)=>(parseD(b.lesson_date)||0)-(parseD(a.lesson_date)||0)).forEach(l=>{
        html+=`<div class="card" style="border-left-color:${subjColor(s)}">
          <h3>${l.title}</h3>
          <div class="meta">${fmt(l.lesson_date)} · Week ${l.week||"?"} · Term ${l.term||"?"}</div>
          <div class="lesson-body">${l.body||""}</div></div>`;
      });
    });
  }
  document.getElementById("view-lessons").innerHTML=html;
}

function renderTerms(data){
  let html=`<div class="view-head">
    <img src="images/egg-books.png" alt="Egg holding books">
    <div class="speak">The big picture for each subject this term, dude.</div>
  </div>`;
  if(!data.termOverviews.length){
    html+=`<div class="empty"><img src="images/egg-hmm.png" alt="Egg puzzled"><p>No term overviews yet — they're on the way.</p></div>`;
  } else {
    const subsWith = Array.from(new Set(data.termOverviews.map(t=>t.subject)));
    const orderedSubs = Object.keys(SUBJECTS).filter(s=>subsWith.includes(s));
    let current = getFilter("terms");
    if(current !== "all" && !orderedSubs.includes(current)) current = "all";
    html += subjFilterBar("terms", orderedSubs, current);
    const filtered = current === "all" ? data.termOverviews : data.termOverviews.filter(t=>t.subject===current);
    filtered.slice().sort((a,b)=>(b.term-a.term)||subjName(a.subject).localeCompare(subjName(b.subject))).forEach(t=>{
      const topics=(t.topics&&t.topics.length)
        ? `<ul class="term-topics">${t.topics.map(x=>`<li>${x}</li>`).join("")}</ul>` : "";
      const rel=(data.assessments||[]).filter(a=>a.subject===t.subject && a.term===t.term)
        .sort((a,b)=>(parseD(a.due_date)||0)-(parseD(b.due_date)||0));
      const assess = rel.length
        ? `<div class="term-assess"><div class="ta-title">Assessed this term</div>`+
          rel.map(a=>`<div class="ta-row"><span>${a.title}</span><span class="meta">${fmt(a.due_date)}</span></div>`).join("")+`</div>`
        : "";
      html+=`<div class="card" style="border-left-color:${subjColor(t.subject)}">
        <div class="top"><span class="chip" style="background:${subjColor(t.subject)}">${subjName(t.subject)}</span>
        <span class="meta">Term ${t.term}</span></div>
        <div class="term-body">${t.body||""}</div>
        ${topics}
        ${assess}</div>`;
    });
  }
  document.getElementById("view-terms").innerHTML=html;
}

function renderEquations(data){
  let html=`<div class="view-head">
    <img src="images/egg-thumbsup.png" alt="Egg giving a thumbs up">
    <div class="speak">Your maths formula cheat-sheet, week by week. Lock these in and you're sweet, dude.</div>
  </div>`;
  const eq=(data.mathsEquations||[]).slice().sort((a,b)=>(b.week||0)-(a.week||0));
  if(!eq.length){
    html+=`<div class="empty"><img src="images/egg-hmm.png" alt="Egg puzzled"><p>No equations loaded yet, dude — they'll show up once Maths gets summarised.</p></div>`;
  } else {
    eq.forEach(w=>{
      html+=`<div class="card" style="border-left-color:var(--maths)">
        <div class="top"><span class="chip" style="background:var(--maths)">Week ${w.week}</span>
        <span class="meta">${w.dates?w.dates+" · ":""}Term ${w.term||"?"}</span></div>
        <h3>${w.topic||""}</h3>
        <div class="eqs">${(w.equations||[]).map(e=>`<code class="eq">${e}</code>`).join("")}</div>
      </div>`;
    });
  }
  document.getElementById("view-equations").innerHTML=html;
}

/* ---------- Tabs ---------- */
function showTab(name){
  const tabs=["assessments","lessons","terms","equations","space"];
  if(!tabs.includes(name)) name="assessments";
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.tab===name));
  tabs.forEach(t=>{const el=document.getElementById("view-"+t); if(el) el.style.display=(t===name)?"":"none";});
  try{ localStorage.setItem("aarghh_tab",name); }catch(e){}
}

/* ---------- Supabase (only used when USE_DEMO_DATA = false) ---------- */
function sbHeaders(){
  const h={"apikey":CONFIG.SUPABASE_PUBLISHABLE_KEY,"Content-Type":"application/json"};
  let tok=null; try{ tok=localStorage.getItem("aarghh_token"); }catch(e){}
  if(tok) h["Authorization"]="Bearer "+tok;
  return h;
}
async function sbSelect(table){
  const r=await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/${table}?select=*`,{headers:sbHeaders()});
  if(r.status===401){
    // Stored token has expired — wipe it and bounce back to the login screen.
    try{ localStorage.removeItem("aarghh_token"); }catch(e){}
    const err=new Error("expired");
    err.code=401;
    throw err;
  }
  if(!r.ok) throw new Error("read failed "+r.status);
  return r.json();
}
async function doLogin(){
  const uname=document.getElementById("username").value.trim().toLowerCase();
  const email=uname.includes("@")?uname:uname+"@"+CONFIG.LOGIN_DOMAIN;
  const password=document.getElementById("password").value;
  const errEl=document.getElementById("loginErr"); errEl.textContent="";
  try{
    const r=await fetch(`${CONFIG.SUPABASE_URL}/auth/v1/token?grant_type=password`,
      {method:"POST",headers:{"apikey":CONFIG.SUPABASE_PUBLISHABLE_KEY,"Content-Type":"application/json"},
       body:JSON.stringify({email,password})});
    const j=await r.json();
    if(!r.ok||!j.access_token){ errEl.textContent=j.error_description||j.msg||"Login failed"; return; }
    try{ localStorage.setItem("aarghh_token",j.access_token); }catch(e){}
    boot();
  }catch(e){ errEl.textContent="Network error — try again"; }
}

/* ---------- Boot ---------- */
async function boot(){
  const loggedIn = (()=>{try{return !!localStorage.getItem("aarghh_token");}catch(e){return false;}})();
  if(!CONFIG.USE_DEMO_DATA && !loggedIn){
    document.getElementById("login").style.display="block";
    document.getElementById("app").style.display="none";
    return;
  }
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  if(CONFIG.USE_DEMO_DATA) document.getElementById("demoFlag").style.display="block";
  try{
    const data=await getData();
    _lastData = data;
    renderMeta(data); renderAssessments(data); renderLessons(data); renderTerms(data); renderEquations(data); renderSpace(data);
    const next=data.assessments.filter(a=>a.status==="upcoming").map(a=>daysUntil(a.due_date)).filter(n=>n!==null&&n>=0).sort((a,b)=>a-b)[0];
    if(next!==undefined){
      const g=next===0?"You've got something due today, dude — let's get on it!":
              next<=3?`Heads up — something's due in ${next} day${next===1?"":"s"}. We've got this.`:
              "Nothing urgent today. Cruisy. Let's stay ahead of it.";
      document.getElementById("greetLine").textContent="Yo Arleena! "+g;
    }
    let last="assessments"; try{last=localStorage.getItem("aarghh_tab")||"assessments";}catch(e){}
    showTab(last);
  }catch(e){
    if(e && e.code===401){
      // Token expired — show the login screen again instead of a confusing error.
      document.getElementById("login").style.display="block";
      document.getElementById("app").style.display="none";
      const errEl=document.getElementById("loginErr");
      if(errEl) errEl.textContent="Session expired, dude — log in again.";
      return;
    }
    document.getElementById("view-assessments").innerHTML=
      `<div class="empty"><img src="images/egg-hmm.png" alt="Egg puzzled"><p>Hmm, couldn't load your stuff, dude. Try refreshing.</p><p style="font-size:12px;color:#888">(${(e&&e.message)||"unknown error"})</p></div>`;
  }
}
boot();
